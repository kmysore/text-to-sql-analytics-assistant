version: 2

models:
  - name: fct_orders
    description: "One row per order, joined with customer, nation, and region. Use this for order-level analysis."
    columns:
      - name: order_id
        description: "Unique identifier for each order"
      - name: customer_id
        description: "Foreign key to the customer who placed the order"
      - name: order_date
        description: "Date the order was placed"
      - name: order_status
        description: "Current status: O=Open, F=Fulfilled, P=Pending"
      - name: order_priority
        description: "Priority level: 1-URGENT, 2-HIGH, 3-MEDIUM, 4-NOT SPECIFIED, 5-LOW"
      - name: region_name
        description: "Geographic region: AFRICA, AMERICA, ASIA, EUROPE, MIDDLE EAST"
      - name: nation_name
        description: "Country name within the region"
      - name: total_revenue
        description: "Total revenue for the order net of discounts. This is the primary revenue metric."
      - name: line_item_count
        description: "Number of line items in the order"
      - name: total_quantity
        description: "Total quantity of items ordered"
      - name: avg_discount
        description: "Average discount applied across line items, as a decimal (0.05 = 5%)"

  - name: agg_monthly_revenue
    description: "Monthly revenue aggregated by region and nation. Use this for trend analysis and time-series questions."
    columns:
      - name: month
        description: "First day of the month, truncated from order_date"
      - name: region_name
        description: "Geographic region: AFRICA, AMERICA, ASIA, EUROPE, MIDDLE EAST"
      - name: nation_name
        description: "Country name within the region"
      - name: order_count
        description: "Number of orders placed that month"
      - name: customer_count
        description: "Number of distinct customers who ordered that month"
      - name: total_revenue
        description: "Sum of revenue for that month, region, and nation"
      - name: avg_order_revenue
        description: "Average revenue per order for that month and region"

  - name: agg_customer_stats
    description: "One row per customer with lifetime stats. Use this for customer-level and segmentation questions."
    columns:
      - name: customer_id
        description: "Unique customer identifier"
      - name: customer_name
        description: "Customer display name"
      - name: market_segment
        description: "Customer segment: AUTOMOBILE, BUILDING, FURNITURE, MACHINERY, HOUSEHOLD"
      - name: account_balance
        description: "Current account balance for the customer"
      - name: nation_name
        description: "Country the customer is based in"
      - name: region_name
        description: "Geographic region the customer is based in"
      - name: total_orders
        description: "Total number of orders placed by this customer"
      - name: lifetime_revenue
        description: "Total revenue from this customer across all orders"
      - name: avg_order_value
        description: "Average revenue per order for this customer"
      - name: first_order_date
        description: "Date of customer's first ever order"
      - name: last_order_date
        description: "Date of customer's most recent order"